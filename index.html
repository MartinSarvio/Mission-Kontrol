<!DOCTYPE html>
<html lang="da" class="dark" style="color-scheme: dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mission Kontrol</title>
    
    <!-- PWA Support -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <style>
      /* Force dark color-scheme */
      *, *::before, *::after { color-scheme: dark !important; }
      
      /* Form inputs only */
      input[type="text"], input[type="password"], input[type="email"], input[type="url"], input[type="search"], input[type="number"],
      textarea, select, .input {
        background: rgba(255,255,255,0.06) !important;
        border: 1px solid rgba(255,255,255,0.1) !important;
        color: #fff !important;
      }
      input:focus, textarea:focus, select:focus {
        border-color: rgba(0,122,255,0.4) !important;
        box-shadow: 0 0 0 3px rgba(0,122,255,0.12) !important;
        outline: none !important;
      }
      
      /* Primary buttons */
      .btn-primary {
        background: #007AFF !important;
        border: 1px solid #007AFF !important;
        color: #fff !important;
      }
      
      /* Sidebar active */
      .sidebar-item.active {
        background: rgba(0,122,255,0.15) !important;
        color: #fff !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
